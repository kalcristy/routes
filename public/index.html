<!DOCTYPE html>
<html>
<head>
  <title>User Management</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bitcount+Prop+Double+Ink:wght@100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
<body>

  <div class="title">
    <h1> 🚀<br> Kalyan's User<br> Management</h1>
    </div>
<div class="container">
    <form id="userForm">
      <label>Enter uid</label>
      <input type="text" class="textarea" id="uid" placeholder="Enter uid" required />
      <input type="text" class="textarea" id="name" placeholder="Enter Name" required />
      <input type="number"class="textarea" id="age" placeholder="Enter Age" required />
      <button type="submit" class="button1">Add User</button>
    </form>
</div>
<div class="list">
    <h2>Users List</h2>
    <ul id="userList"></ul>
  </div>

  <script src="script.js"></script>
</body>
