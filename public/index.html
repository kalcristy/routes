<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Kalyan User Management</title>

  <link rel="stylesheet" href="style.css"/>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet">
</head>

<body>

  <div class="backgroundGlow"></div>

  <header class="topbar">
    <div>
      <h1 class="logo">⚡ KALYAN USER CONTROL</h1>
      <p class="subtitle">Modern User Management Dashboard</p>
    </div>

    <button id="themeToggle" class="themeBtn">
      🌙 Dark Mode
    </button>
  </header>

  <section class="hero">
    <div class="heroOverlay"></div>

    <div class="heroContent">
      <h1 id="heroTitle">USER MANAGEMENT SYSTEM</h1>
      <p id="heroText">
        Manage users with style, speed and power.
      </p>
    </div>
  </section>

  <main class="mainGrid">

    <!-- LEFT -->
    <section class="card formCard">

      <div class="cardHeader">
        <h2>Add User</h2>
        <div class="liveDot"></div>
      </div>

      <form id="userForm">

        <div class="inputGroup">
          <label>UID</label>
          <input type="number" id="uid" placeholder="Enter UID" required>
        </div>

        <div class="inputGroup">
          <label>Name</label>
          <input type="text" id="name" placeholder="Enter Name" required>
        </div>

        <div class="inputGroup">
          <label>Age</label>
          <input type="number" id="age" placeholder="Enter Age" required>
        </div>

        <button type="submit" class="primaryBtn">
          Add User
        </button>

      </form>
    </section>

    <!-- RIGHT -->
    <section class="card listCard">

      <div class="listTop">

        <div>
          <h2>User Database</h2>
          <p id="countText">0 Users</p>
        </div>

        <input
          type="text"
          id="searchInput"
          placeholder="Search users..."
          class="searchBox"
        >
      </div>

      <ul id="userList"></ul>

    </section>

  </main>

  <div id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
